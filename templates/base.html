<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(135deg, #0f172a, #1e3a8a);
        min-height: 100vh;
      }

      .todo-card {
        border: none;
        border-radius: 20px;
        overflow: hidden;
      }

      .table td,
      .table th {
        vertical-align: middle;
      }

      .table tbody tr:hover {
        background: #f8f9fa;
        transition: 0.3s;
      }

      .btn {
        border-radius: 10px;
      }

      .card-header {
        background: #2563eb;
        color: white;
      }

      .hero {
        color: white;
        padding: 40px 0;
      }

      .empty {
        padding: 40px;
        text-align: center;
        color: gray;
      }

      .navbar {
        background-color: #2563eb !important;
      }

      .navbar-brand,
      .navbar .nav-link {
        color: #ffffff !important;
      }

      .navbar .nav-link:hover,
      .navbar .nav-link.active {
        color: #dbeafe !important;
      }

      .navbar-toggler {
        border-color: rgba(255, 255, 255, 0.5) !important;
      }

      .navbar-toggler-icon {
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(255,255,255,0.9)' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e") !important;
      }
    </style>
  </head>
  <body>
    <main>
      <nav class="navbar navbar-expand-lg shadow-lg">
        <div class="container-fluid">
          <a class="navbar-brand" href="/">Todo App</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="/">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="/about">About</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="/search">Search</a>
              </li>
            </ul>

          </div>
        </div>
      </nav>
      {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
